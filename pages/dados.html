<div class="grid-2" style="align-items:start">
  <div class="card">
    <div class="card-header"><h3>Exportar Dados</h3></div>
    <div class="card-body">
      <p style="font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.6">Exporte todos os dados do sistema para backup.</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-secondary btn-block" onclick="exportJSON()">Exportar JSON (Backup)</button>
        <button class="btn btn-secondary btn-block" onclick="exportCSV()">Exportar CSV (Excel)</button>
        <button class="btn btn-secondary btn-block" onclick="exportRelPDF()">Exportar Relatório TXT</button>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><h3>Importar Dados</h3></div>
    <div class="card-body">
      <p style="font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.6">Importe um arquivo JSON exportado anteriormente.</p>
      <label class="btn btn-secondary btn-block" style="cursor:pointer;justify-content:center">
        Selecionar arquivo JSON
        <input type="file" accept=".json" onchange="importJSON(event)" style="display:none">
      </label>
      <div style="margin-top:12px;padding:10px;background:var(--red-dim);border:1px solid var(--red-border);border-radius:2px;font-size:11px;color:var(--text2)">
        Atenção: importar um arquivo sobrescreve todos os dados atuais.
      </div>
    </div>
  </div>
</div>
<div class="card" style="margin-top:16px">
  <div class="card-header"><h3>Resumo do Banco de Dados</h3></div>
  <div class="card-body" id="dados-resumo"></div>
</div>
