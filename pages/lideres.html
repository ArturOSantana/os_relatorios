<div class="grid-2" style="align-items:start">
  <div class="card">
    <div class="card-header"><h3>Líderes Cadastrados</h3></div>
    <div class="card-body" id="lideres-lista-cad"></div>
  </div>
  <div class="card">
    <div class="card-header"><h3>Adicionar Líder</h3></div>
    <div class="card-body">
      <div class="form-group">
        <label class="form-label">Nome</label>
        <input type="text" class="form-input" id="cad-lider-nome" placeholder="Nome do líder">
      </div>
      <div class="form-group">
        <label class="form-label">Turno padrão</label>
        <select class="form-select" id="cad-lider-turno">
          <option value="Manhã">Manhã</option>
          <option value="Tarde">Tarde</option>
          <option value="Noturno">Noturno</option>
        </select>
      </div>
      <button class="btn btn-primary btn-block" onclick="salvarLider()">Adicionar Líder</button>
    </div>
  </div>
</div>
