<div class="card section-gap">
  <div class="card-header"><h3>Filtro do Relatório</h3></div>
  <div class="card-body">
    <div class="form-row col3">
      <div class="form-group">
        <label class="form-label">Mês/Ano</label>
        <select class="form-select" id="rel-mes"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Período</label>
        <select class="form-select" id="rel-periodo">
          <option value="">Todos</option>
          <option value="Manhã">Manhã</option>
          <option value="Tarde">Tarde</option>
          <option value="Noturno">Noturno</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Líder</label>
        <select class="form-select" id="rel-lider"><option value="">Todos</option></select>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" onclick="gerarRelatorio()">Gerar Relatório</button>
      <button class="btn btn-secondary" onclick="gerarRelatorioCompleto()">Relatório Completo</button>
    </div>
  </div>
</div>

<div id="rel-resultado" style="display:none">
  <div class="card">
    <div class="card-header">
      <h3 id="rel-titulo">Relatório</h3>
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" onclick="copiarTextoEl('rel-formal-text')">Copiar Formal</button>
        <button class="btn btn-ghost btn-sm" onclick="copiarTextoEl('rel-wapp-text')">Copiar WhatsApp</button>
        <button class="btn btn-success btn-sm" onclick="abrirWapp('rel-wapp-text')">WhatsApp</button>
      </div>
    </div>
    <div class="card-body">
      <div class="relatorio-text" id="rel-formal-text" style="margin-bottom:14px"></div>
      <div style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:8px">Formato WhatsApp</div>
      <div class="wapp-text" id="rel-wapp-text"></div>
    </div>
  </div>
</div>
